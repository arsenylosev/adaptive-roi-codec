model:
  latent_h: 21
  latent_w: 21
  latent_ch: 192
  input_res: [336, 336]

training:
  batch_size: 4
  lr: 1.0e-4
  epochs: 50
  warmup_epochs: 5
  alpha: 0.5
  lambda_roi: 1.5
  lambda_rate: 0.01
  lambda_temp: 0.1
  beta_0: 0.01
  eta: 0.5
  log_every_batches: 20

quantizer:
  q_min: 0.1
  q_max: 2.0
  kappa: 2.0
  alpha_spatial: 0.5

roi_detector:
  input_res: 336
  backbone: mobilenet_v3_large
  pretrained: true

data:
  s3_prefix: kvasir-capsule
  local_root: kvasir-capsule
  # video: decode MP4 on the fly (slow over S3 FUSE). preprocessed: read stage-1 .pt frames.
  source: video
  frames_root: frames_cache
  video_subdir: raw/labelled_videos
  splits_subdir: splits
  split: train
  frame_stride: 30
  max_frames_per_video: null
  num_workers: 2
  shuffle: true
  dry_run_samples: 4
  debug_res: [336, 336]

checkpoints:
  subdir: checkpoints
  save_every_epochs: 5
  local_dir: checkpoints
